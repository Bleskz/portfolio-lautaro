<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#020502"/>

  <!-- Subtle grid lines -->
  <line x1="8" y1="0" x2="8" y2="32" stroke="#00FF41" stroke-width="0.15" opacity="0.3"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#00FF41" stroke-width="0.15" opacity="0.3"/>
  <line x1="24" y1="0" x2="24" y2="32" stroke="#00FF41" stroke-width="0.15" opacity="0.3"/>
  <line x1="0" y1="8" x2="32" y2="8" stroke="#00FF41" stroke-width="0.15" opacity="0.3"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#00FF41" stroke-width="0.15" opacity="0.3"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#00FF41" stroke-width="0.15" opacity="0.3"/>

  <!-- L initial -->
  <path d="M5 7 L5 22 L12 22" stroke="#00FF41" stroke-width="2.5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- V initial -->
  <path d="M15 7 L20 22 L25 7" stroke="#00FF41" stroke-width="2.5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Corner accents top-left (cyan) -->
  <line x1="2" y1="2" x2="6" y2="2" stroke="#00FFFF" stroke-width="1" opacity="0.8"/>
  <line x1="2" y1="2" x2="2" y2="6" stroke="#00FFFF" stroke-width="1" opacity="0.8"/>

  <!-- Corner accents bottom-right (cyan) -->
  <line x1="30" y1="30" x2="26" y2="30" stroke="#00FFFF" stroke-width="1" opacity="0.8"/>
  <line x1="30" y1="30" x2="30" y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.8"/>
</svg>
