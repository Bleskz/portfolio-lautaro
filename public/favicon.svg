<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Terminal window border, no fill -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="2" ry="2"
    fill="none" stroke="#00FF41" stroke-width="2"/>
  <!-- >_ prompt centered inside -->
  <text
    x="4" y="22"
    font-family="monospace"
    font-size="16"
    font-weight="700"
    fill="#00FF41"
  >&gt;_</text>
</svg>
